<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>준비 중 | 25 Lectures</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: #f7f8fa;
      color: #1f2937;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1.65;
    }

    .wrap {
      width: 100%;
      max-width: 760px;
      padding: 24px;
    }

    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 20px;
      padding: 48px 40px;
      text-align: center;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.05);
    }

    .label {
      display: inline-block;
      margin-bottom: 16px;
      padding: 6px 12px;
      border-radius: 999px;
      background: #eef2ff;
      color: #334155;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 14px;
      font-size: 42px;
      line-height: 1.15;
      letter-spacing: -0.04em;
      color: #111827;
    }

    p {
      margin: 0 auto 12px;
      max-width: 560px;
      font-size: 17px;
      color: #4b5563;
    }

    .button-row {
      margin-top: 28px;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-block;
      padding: 12px 18px;
      border-radius: 12px;
      text-decoration: none;
      font-size: 15px;
      font-weight: 700;
      border: 1px solid #1f2937;
      background: #1f2937;
      color: #fff;
      transition: 0.15s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn.secondary {
      background: #fff;
      color: #1f2937;
    }

    @media (max-width: 640px) {
      .card {
        padding: 36px 24px;
      }

      h1 {
        font-size: 32px;
      }

      p {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="label">25 Lectures</div>
      <h1>페이지 준비 중입니다</h1>
      <p>
        요청하신 페이지는 현재 준비 중입니다.
        어떤 자료는 머지않아 제공되겠지만, 새로운 시리즈같은 정보는 몇년이
        걸릴 수도 있습니다. 
      </p>
      <p>
        다시 방문해 주세요.
      </p>

      <div class="button-row">
        <a class="btn" href="https://www.25lectures.com" target="_top">25 Lectures.com</a>
        <a class="btn secondary" href="javascript:history.back()">이전 페이지</a>
      </div>
    </div>
  </div>
</body>
</html>
