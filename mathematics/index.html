<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>대학수학 | 25 Lectures</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: #f7f7f7;
      color: #222;
      line-height: 1.7;
    }
    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }

    header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #e8e8e8;
    }
    .nav-wrap {
      max-width: 1280px;
      margin: 0 auto;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
    }
    .brand img { height: 40px; width: auto; }
    .nav {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      font-size: 15px;
      color: #555;
    }
    .nav a:hover { color: #000; }

    .page-header {
      max-width: 1280px;
      margin: 0 auto;
      padding: 46px 24px 24px;
    }
    .page-header h1 {
      margin: 0 0 10px;
      font-size: 42px;
      letter-spacing: -0.8px;
    }
    .page-header p {
      margin: 0;
      color: #666;
      font-size: 17px;
      max-width: 860px;
    }

    .layout {
      max-width: 1280px;
      margin: 0 auto;
      padding: 20px 24px 64px;
      display: grid;
      grid-template-columns: 340px minmax(0, 1fr);
      gap: 28px;
      align-items: start;
    }

    .sidebar,
    .content-shell {
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 20px;
    }

    .sidebar {
      padding: 20px;
      position: sticky;
      top: 86px;
    }
    .sidebar h2 {
      margin: 0 0 14px;
      font-size: 22px;
      letter-spacing: -0.3px;
    }
    .sidebar-section { margin-bottom: 26px; }
    .sidebar-section:last-child { margin-bottom: 0; }
    .sidebar-section-title {
      margin: 0 0 12px;
      font-size: 14px;
      font-weight: 700;
      color: #777;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .book-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .book-item {
      width: 100%;
      text-align: left;
      border: 1px solid #e5e5e5;
      background: #fafafa;
      border-radius: 16px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.15s ease;
      font: inherit;
      color: inherit;
    }
    .book-item:hover {
      background: #f2f4f8;
      border-color: #cfd6e0;
    }
    .book-item.active {
      background: #1f2d3d;
      color: #fff;
      border-color: #1f2d3d;
    }
    .book-item .title {
      font-size: 19px;
      font-weight: 800;
      line-height: 1.3;
      margin-bottom: 4px;
      letter-spacing: -0.2px;
    }
    .book-item .meta {
      font-size: 13px;
      opacity: 0.82;
    }

    .content-shell {
      overflow: hidden;
      min-height: 980px;
      background: #fff;
    }
    #book-frame {
      display: block;
      width: 100%;
      min-height: 1600px;
      border: none;
      background: #fff;
    }

    footer {
      background: #fff;
      border-top: 1px solid #e8e8e8;
    }
    .footer-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 28px 24px 36px;
      color: #777;
      font-size: 14px;
    }

    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { position: static; }
      #book-frame, .content-shell { min-height: 720px; }
    }

    @media (max-width: 680px) {
      .nav-wrap {
        flex-direction: column;
        align-items: flex-start;
      }
      .page-header h1 { font-size: 34px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="nav-wrap">
      <div class="brand">
        <a href="../index.html"><img src="../assets/images/dotcomlogo.png" alt="25 Lectures 로고"></a>
      </div>
      <nav class="nav">
        <a href="../about/index.html">소개</a>
        <a href="../mathematics/index.html">대학수학</a>
        <a href="../statistics/index.html">대학통계</a>
        <a href="../physics/index.html">대학물리</a>
        <a href="../biology/index.html">대학생물</a>
        <a href="../chemistry/index.html">대학화학</a>
        <a href="../materials/index.html">강의자료</a>
        <a href="../videos/index.html">강의영상</a>
        <a href="../publish/index.html">출판하기</a>
      </nav>
    </div>
  </header>

  <main class="layout">
    <aside class="sidebar">
      <div class="sidebar-section">
        <font size="4"><b>25 Lectures for<br> Undergraduate Mathematics</b></font>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-section-title">출판된 교재</div>
        <div class="book-list">
          <button class="book-item active" data-file="math001.html">
            <div class="title">#1. Single Variable Calculus</div>
            <div class="meta">출판됨 · 경문사</div>
          </button>

          <button class="book-item" data-file="math002.html">
            <div class="title">#2. Multivariable Calculus</div>
            <div class="meta">출판됨 · 경문사</div>
          </button>
        </div>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-section-title">출판 예정 교재</div>
        <div class="book-list">
          <button class="book-item" data-file="math003.html">
            <div class="title">#3. AI and Mathematical Modeling</div>
            <div class="meta">출판 예정</div>
          </button>

          <button class="book-item" data-file="math004.html">
            <div class="title">#4. Introduction to PDE</div>
            <div class="meta">출판 예정</div>
          </button>
        </div>
      </div>
    </aside>

    <section class="content-shell">
      <iframe id="book-frame" src="math001.html" title="교재 상세"></iframe>
    </section>
  </main>

  <footer>
    <div class="footer-inner">© 2026 25 Lectures Series. All rights reserved.</div>
  </footer>

<script>
    function setActiveButton(fileName) {
      document.querySelectorAll('.book-item').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.file === fileName);
      });
    }

    function loadBook(fileName, pushHash = true) {
      const frame = document.getElementById('book-frame');
      frame.src = fileName;
      setActiveButton(fileName);
      if (pushHash) {
        window.location.hash = fileName.replace('.html', '');
      }
    }

    document.addEventListener('DOMContentLoaded', function () {
      const buttons = document.querySelectorAll('.book-item');
      buttons.forEach(button => {
        button.addEventListener('click', function () {
          loadBook(this.dataset.file);
        });
      });

      const hash = window.location.hash.replace('#', '');
      if (hash) {
        const fileName = `${hash}.html`;
        const matched = document.querySelector(`.book-item[data-file="${fileName}"]`);
        if (matched) loadBook(fileName, false);
      }
    });

function resizeIframe() {
  const iframe = document.getElementById("book-frame");
  iframe.style.height =
    iframe.contentWindow.document.body.scrollHeight + "px";
}

document.getElementById("book-frame").addEventListener("load", resizeIframe);

  </script>
</body>
</html>
